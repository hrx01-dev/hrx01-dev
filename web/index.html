<!doctype html>
<html lang="en">
<head>

      <div class="skill"><img src="../assets/icons/git.svg" alt="Git"/><span>Git</span></div>
      <div class="skill"><img src="../assets/icons/docker.svg" alt="Docker"/><span>Docker</span></div>
      <div class="skill"><img src="../assets/icons/kubernetes.svg" alt="Kubernetes"/><span>Kubernetes</span></div>
    </div>

  <section class="projects">
    <h2>Featured project</h2>
    <figure class="screenshot">
      <img src="../assets/project-screenshot.svg" alt="Project screenshot"/>

  <footer class="footer">
    <a href="../README.md">Back to README</a>
